<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-eval'; style-src 'self'; media-src 'self' blob: mediastream:"
    />
    <title></title>
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/cursor.css" />
    <link rel="stylesheet" href="../styles/highlighter.css" />
    <link rel="stylesheet" href="../styles/learning-widget.css" />
  </head>
  <body>
    <div id="accessibility-contrast-layer" class="accessibility-contrast-layer"></div>
    <div id="accessibility-magnifier" class="accessibility-magnifier">
      <canvas id="accessibility-magnifier-canvas"></canvas>
    </div>
    <canvas id="highlighter-canvas" class="highlighter-canvas"></canvas>
    <div id="accessibility-status" class="accessibility-status hidden">
      Voice control listening
    </div>
    <div id="ai-cursor" class="ai-cursor hidden" aria-hidden="true">
      <div class="ai-cursor-pointer"></div>
      <div class="ai-cursor-ring"></div>
      <div id="ai-step-widget" class="ai-step-widget hidden" aria-live="polite">
        <div class="ai-step-widget__tail"></div>
        <div class="ai-step-widget__card">
          <button
            id="ai-cancel-btn"
            class="ai-step-widget__close"
            type="button"
            aria-label="Cancel guided prompt"
          >
            x
          </button>
          <div class="ai-step-widget__header">
            <span class="ai-step-widget__icon" aria-hidden="true">✦</span>
            <span id="ai-step-widget-badge" class="ai-step-widget__badge"></span>
          </div>
          <div id="ai-step-widget-text" class="ai-step-widget__text"></div>
          <div id="ai-step-widget-footer" class="ai-step-widget__footer hidden">
            <button id="ai-done-btn" class="ai-step-widget__done-btn" type="button">
              Done ✓
            </button>
          </div>
        </div>
      </div>
    </div>
    <div id="ai-prompt-controls" class="ai-prompt-controls hidden">
      <button id="ai-next-btn" class="ai-next-btn" type="button">
        Next Step
      </button>
      <button id="ai-complete-btn" class="ai-complete-btn hidden" type="button">
        Complete
      </button>
    </div>
    <div id="ai-learning-widget" class="ai-learning-widget hidden" aria-live="polite">
      <div class="ai-learning-widget__card">
        <button
          id="ai-learning-widget-close"
          class="ai-learning-widget__close"
          type="button"
          aria-label="Close learning widget"
        >
          x
        </button>
        <div class="ai-learning-widget__header" title="Drag to move">
          <span class="ai-learning-widget__icon" aria-hidden="true">✦</span>
          <span class="ai-learning-widget__badge">Tutor</span>
        </div>
        <div id="ai-learning-widget-explanation" class="ai-learning-widget__explanation"></div>
        <div id="ai-learning-widget-diagram" class="ai-learning-widget__diagram hidden">
          <div id="ai-learning-widget-mermaid" class="mermaid"></div>
        </div>
        <div id="ai-learning-widget-blueprint-host" class="ai-learning-widget__blueprint hidden"></div>
      </div>
    </div>
    <script type="module" src="../index.js"></script>
  </body>
</html>
