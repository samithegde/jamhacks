<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #b223e3 0%, #440046 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .container {
            background: rgba(38, 33, 38, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(178, 35, 227, 0.3);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container {
            margin-bottom: 20px;
        }

        .logo-container img {
            max-width: 280px;
            height: auto;
            width: 100%;
            filter: drop-shadow(0 4px 15px rgba(178, 35, 227, 0.4));
        }

        .header p {
            color: #e0e0e0;
            font-size: 14px;
            margin-top: 16px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #ffffff;
        }

        .status-badge.active {
            background: rgba(178, 35, 227, 0.3);
            color: #ffffff;
            border: 1px solid rgba(178, 35, 227, 0.6);
        }

        .status-badge.inactive {
            background: rgba(68, 0, 70, 0.3);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 30px;
        }

        button {
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
            color: #ffffff;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-primary {
            background: rgba(178, 35, 227, 0.4);
            border: 1px solid rgba(178, 35, 227, 0.6);
            color: #ffffff;
        }

        .btn-primary:hover {
            background: rgba(178, 35, 227, 0.6);
            box-shadow: 0 12px 24px rgba(178, 35, 227, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(68, 0, 70, 0.4);
            color: #ffffff;
            border: 1px solid rgba(178, 35, 227, 0.4);
        }

        .btn-secondary:hover {
            background: rgba(178, 35, 227, 0.3);
            border: 1px solid rgba(178, 35, 227, 0.6);
        }

        .btn-danger {
            background: rgba(139, 0, 0, 0.4);
            color: #ffffff;
            border: 1px solid rgba(255, 100, 100, 0.4);
        }

        .btn-danger:hover {
            background: rgba(139, 0, 0, 0.6);
            box-shadow: 0 12px 24px rgba(139, 0, 0, 0.3);
        }

        .info-box {
            background: rgba(178, 35, 227, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(178, 35, 227, 0.3);
            border-left: 4px solid rgba(178, 35, 227, 0.6);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 14px;
            color: #ffffff;
        }

        .info-box strong {
            display: block;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .display-list {
            background: rgba(68, 0, 70, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(178, 35, 227, 0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 13px;
        }

        .display-item {
            padding: 8px;
            background: rgba(178, 35, 227, 0.1);
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(178, 35, 227, 0.2);
        }

        .display-item:last-child {
            margin-bottom: 0;
        }

        .display-name {
            font-weight: 500;
            color: #ffffff;
        }

        .display-res {
            color: #b0b0b0;
            font-size: 12px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(178, 35, 227, 0.3);
            border-top: 2px solid #b223e3;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #ffffff;
        }

        .error {
            background: rgba(139, 0, 0, 0.25);
            color: #ff9999;
            border: 1px solid rgba(255, 100, 100, 0.5);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <img src="./logo.png" alt="Clarity">
            </div>
            <p>Overlay Control Dashboard</p>
            <div id="statusBadge" class="status-badge inactive">Loading...</div>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="displayInfo" class="display-list" style="display: none;"></div>

        <div class="info-box">
            <strong>Displays</strong>
            <div id="displayCount">Checking...</div>
        </div>

        <div class="controls">
            <button id="toggleBtn" class="btn-primary">
                <span class="spinner" style="display: none; margin-right: 8px;"></span>
                <span id="toggleText">Start Overlay</span>
            </button>
            <button id="chatBtn" class="btn-secondary">Show Chat</button>
            <button id="quitBtn" class="btn-danger">Quit App</button>
        </div>

        <div class="info-box">
            <strong>💡 Quick Info</strong>
            The overlay captures your screen in real-time. Use the chat window to interact with the AI assistant.
        </div>
    </div>

    <script>
        const { ipcRenderer } = require('electron');

        let overlayActive = false;

        async function updateStatus() {
            try {
                const status = await ipcRenderer.invoke('get-overlay-status');
                overlayActive = status.active;
                updateUI();
            } catch (error) {
                console.error('Error getting status:', error);
                showError('Failed to get overlay status');
            }
        }

        function updateUI() {
            const badge = document.getElementById('statusBadge');
            const toggleBtn = document.getElementById('toggleBtn');
            const toggleText = document.getElementById('toggleText');

            if (overlayActive) {
                badge.textContent = '● Active';
                badge.className = 'status-badge active';
                toggleText.textContent = 'Stop Overlay';
            } else {
                badge.textContent = '● Inactive';
                badge.className = 'status-badge inactive';
                toggleText.textContent = 'Start Overlay';
            }
        }

        async function updateDisplayInfo() {
            try {
                const displays = await ipcRenderer.invoke('get-displays');
                document.getElementById('displayCount').innerHTML = 
                    `<strong>${displays.length}</strong> display${displays.length !== 1 ? 's' : ''} connected`;

                const displayInfo = document.getElementById('displayInfo');
                if (displays.length > 0) {
                    displayInfo.innerHTML = displays
                        .map((d, i) => `
                            <div class="display-item">
                                <div>
                                    <div class="display-name">Display ${i + 1}</div>
                                    <div class="display-res">${d.bounds.width}×${d.bounds.height}</div>
                                </div>
                            </div>
                        `).join('');
                    displayInfo.style.display = 'block';
                }
            } catch (error) {
                console.error('Error getting displays:', error);
            }
        }

        function showError(message) {
            const errorEl = document.getElementById('error');
            errorEl.textContent = message;
            errorEl.style.display = 'block';
            setTimeout(() => {
                errorEl.style.display = 'none';
            }, 5000);
        }

        async function toggleOverlay() {
            const toggleBtn = document.getElementById('toggleBtn');
            const spinner = toggleBtn.querySelector('.spinner');
            toggleBtn.disabled = true;
            spinner.style.display = 'inline-block';

            try {
                if (overlayActive) {
                    await ipcRenderer.invoke('hide-overlay');
                } else {
                    await ipcRenderer.invoke('show-overlay');
                }
                await updateStatus();
            } catch (error) {
                console.error('Error toggling overlay:', error);
                showError('Failed to toggle overlay');
            } finally {
                toggleBtn.disabled = false;
                spinner.style.display = 'none';
            }
        }

        function showChat() {
            ipcRenderer.invoke('show-chat');
        }

        function quitApp() {
            if (confirm('Are you sure you want to quit?')) {
                ipcRenderer.invoke('quit-app');
            }
        }

        document.getElementById('toggleBtn').addEventListener('click', toggleOverlay);
        document.getElementById('chatBtn').addEventListener('click', showChat);
        document.getElementById('quitBtn').addEventListener('click', quitApp);

        // Listen for overlay state changes
        ipcRenderer.on('overlay-state-changed', (event, state) => {
            overlayActive = state.active;
            updateUI();
        });

        // Initial load
        updateStatus();
        updateDisplayInfo();
        setInterval(updateDisplayInfo, 2000);
    </script>
</body>
</html>
